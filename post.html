<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读笔记</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">主页</a>
            <div class="nav-links">
                <a href="publications.html">出版物</a>
                <a href="resume.html">简历</a>
                <a href="notes.html" class="active">返回笔记</a>
            </div>
        </div>
    </nav>

    <main class="container fade-in">
        <div id="content" class="content markdown-body">
            <p>正在加载内容...</p>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        const contentDiv = document.getElementById('content');

        if (fileName) {
            fetch(`notes/${fileName}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应错误，可能文件不存在。如果是在本地直接双击打开的，请确保使用本地服务器(运行 preview.command)打开。');
                    }
                    return response.text();
                })
                .then(text => {
                    contentDiv.innerHTML = marked.parse(text);
                    const firstH1 = contentDiv.querySelector('h1');
                    if (firstH1) {
                        document.title = firstH1.innerText;
                    }
                })
                .catch(error => {
                    contentDiv.innerHTML = `<h2 style="color: #ef4444;">加载失败 😢</h2><p>${error.message}</p>`;
                });
        } else {
            contentDiv.innerHTML = '<h2>未指定要阅读的笔记。</h2>';
        }
    </script>
</body>
</html>
