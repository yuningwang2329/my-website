<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <title>阅读中…</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">✦</a>
            <div class="nav-links">
                <a href="publications.html">出版物</a>
                <a href="resume.html">简历</a>
                <a href="notes.html">笔记</a>
            </div>
        </div>
    </nav>

    <main class="main fade-in">
        <article id="content" class="md-body">
            <p style="color: var(--text-secondary);">正在加载…</p>
        </article>
    </main>

    <footer class="site-footer">
        <span>💡 本站设计与代码框架由 AI 辅助生成</span>
        <span id="last-updated"></span>
    </footer>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        const contentDiv = document.getElementById('content');

        if (fileName) {
            fetch('notes/' + fileName)
                .then(function(response) {
                    if (!response.ok) throw new Error('文件不存在或无法加载。如果是本地预览，请使用 preview.command 启动服务器。');
                    return response.text();
                })
                .then(function(text) {
                    contentDiv.innerHTML = marked.parse(text);
                    var firstH1 = contentDiv.querySelector('h1');
                    if (firstH1) document.title = firstH1.innerText;
                })
                .catch(function(error) {
                    contentDiv.innerHTML = '<h1>加载失败</h1><p>' + error.message + '</p>';
                });
        } else {
            contentDiv.innerHTML = '<h1>未指定笔记</h1><p>请从<a href="notes.html">笔记列表</a>中选择一篇阅读。</p>';
        }
    </script>
</body>
</html>
