<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <title>阅读中…</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.bootcdn.net/ajax/libs/mathjax/3.2.2/es5/tex-chtml.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">✦</a>
            <div class="nav-links">
                <a href="publications.html">出版物</a>
                <a href="resume.html">简历</a>
                <a href="notes.html">笔记</a>
                <a href="fluids.html">流体论文</a>
                <button id="search-btn" class="search-btn" aria-label="搜索"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
            </div>
        </div>
    </nav>

    <div id="search-overlay" class="search-overlay">
        <div class="search-panel">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input id="search-input" class="search-input" type="text" placeholder="搜索" autocomplete="off">
                </div>
                <div id="search-label" class="search-results-label">快速链接</div>
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </div>

    <main class="main fade-in">
        <article id="content" class="md-body">
            <p style="color: var(--text-secondary);">正在加载…</p>
        </article>
    </main>

    <footer class="site-footer">
                <span id="last-updated"></span>
    </footer>

    <script src="script.js"></script>
    <script src="search.js"></script>
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var fileName = urlParams.get('file');
        var contentDiv = document.getElementById('content');

        if (fileName) {
            fetch('notes/' + fileName)
                .then(function(response) {
                    if (!response.ok) throw new Error('文件不存在或无法加载。如果是本地预览，请使用 preview.command 启动服务器。');
                    return response.text();
                })
                .then(function(text) {
                    contentDiv.innerHTML = marked.parse(text);
                    var firstH1 = contentDiv.querySelector('h1');
                    if (firstH1) document.title = firstH1.innerText;
                    if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                        MathJax.typesetPromise([contentDiv]);
                    }
                })
                .catch(function(error) {
                    contentDiv.innerHTML = '<h1>加载失败</h1><p>' + error.message + '</p>';
                });
        } else {
            contentDiv.innerHTML = '<h1>未指定笔记</h1><p>请从<a href="notes.html">笔记列表</a>中选择一篇阅读。</p>';
        }
    </script>
</body>
</html>
