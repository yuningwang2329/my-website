<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="流体动力学与偏微分方程最新论文">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <title>流体论文库</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">✦</a>
            <div class="nav-links">
                <a href="publications.html">出版物</a>
                <a href="resume.html">简历</a>
                <a href="notes.html">笔记</a>
                <a href="fluids.html" class="active">文献库</a>
                <button id="search-btn" class="search-btn" aria-label="搜索"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
            </div>
        </div>
    </nav>

    <div id="search-overlay" class="search-overlay">
        <div class="search-panel">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input id="search-input" class="search-input" type="text" placeholder="全局搜索" autocomplete="off">
                </div>
                <div id="search-label" class="search-results-label">快速链接</div>
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </div>

    <main class="main stagger fade-in">
        <div class="fluids-layout">
            <!-- Left Sidebar (Folder Navigation) -->
            <aside class="fluids-sidebar">
                <div class="folder-group">
                    <div class="folder-header">文献库</div>
                    <ul class="folder-list" id="main-folders">
                        <li>
                            <a href="#" class="folder-link active" onclick="switchFolder('archive', this); return false;">
                                <span>所有文献</span>
                                <span class="sidebar-count" id="count-archive">0</span>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="folder-link" onclick="switchFolder('starred', this); return false;">
                                <span>收藏夹</span>
                                <span class="sidebar-count" id="count-starred">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="folder-group" style="margin-top: 24px;">
                    <div class="folder-header">专题 (Topics)</div>
                    <ul class="folder-list" id="topic-folders">
                        <li>
                            <a href="#" class="folder-link" onclick="switchFolder('topic:stability', this); return false;">
                                <span>水动力稳定性</span>
                                <span class="sidebar-count" id="count-stability">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="folder-group" style="margin-top: 24px;">
                    <div class="folder-header">按期刊</div>
                    <ul class="folder-list" id="journal-folders">
                        <!-- Dynamically populated -->
                    </ul>
                </div>
            </aside>
            
            <!-- Right Content Area (List View) -->
            <div class="fluids-content">
                <div class="content-header">
                    <h1 class="page-title" id="view-title">所有文献</h1>
                    <div class="content-actions">
                        <button id="mark-all-read" class="action-btn" style="display: none;" onclick="markAllRead()">标为已读</button>
                    </div>
                </div>
                
                <div id="fluids-list-container">
                    <p style="color: var(--text-secondary); padding: 20px 0;">正在加载文献数据…</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <span id="last-updated"></span>
    </footer>

    <script>
        let allPapers = [];
        let currentFolder = 'archive'; // archive | starred | journal:{name} | topic:{tag}
        
        function getReadPapers() {
            return JSON.parse(localStorage.getItem('fluids_read') || '[]');
        }
        function getStarredPapers() {
            return JSON.parse(localStorage.getItem('fluids_stars') || '[]');
        }
        
        function markRead(filename) {
            let read = getReadPapers();
            if (!read.includes(filename)) {
                read.push(filename);
                localStorage.setItem('fluids_read', JSON.stringify(read));
            }
        }
        
        function markAllRead() {
            let read = getReadPapers();
            let added = false;
            allPapers.forEach(p => {
                if (currentFolder === 'archive' || 
                   (currentFolder.startsWith('topic:') && (p.tags || []).includes(currentFolder.replace('topic:', ''))) ||
                   (currentFolder.startsWith('journal:') && p.source === currentFolder.replace('journal:', ''))) {
                    if (!read.includes(p.filename)) {
                        read.push(p.filename);
                        added = true;
                    }
                }
            });
            if (added) {
                localStorage.setItem('fluids_read', JSON.stringify(read));
                render();
            }
        }
        
        function toggleStar(e, filename) {
            e.preventDefault();
            e.stopPropagation();
            let stars = getStarredPapers();
            if (stars.includes(filename)) {
                stars = stars.filter(f => f !== filename);
            } else {
                stars.push(filename);
            }
            localStorage.setItem('fluids_stars', JSON.stringify(stars));
            render();
        }

        function switchFolder(folderId, element) {
            currentFolder = folderId;
            document.querySelectorAll('.folder-link').forEach(el => el.classList.remove('active'));
            if (element) {
                element.classList.add('active');
            }
            
            // Update title
            const titles = {
                'starred': '收藏夹',
                'archive': '所有文献',
                'topic:stability': '水动力稳定性'
            };
            if (folderId.startsWith('journal:')) {
                document.getElementById('view-title').textContent = folderId.replace('journal:', '');
            } else {
                document.getElementById('view-title').textContent = titles[folderId] || '';
            }
            
            render();
        }
        
        function formatMonth(dateStr) {
            var parts = dateStr.split('-');
            return parts[0] + '年' + parseInt(parts[1]) + '月';
        }

        function render() {
            let readPapers = getReadPapers();
            let starredPapers = getStarredPapers();
            
            // 1. Calculate and update sidebar counts
            let starredCount = starredPapers.length;
            let archiveCount = allPapers.length;
            let topicCounts = { 'stability': 0 };
            let journalCounts = {};
            
            let unreadInCurrentFolder = 0;
            
            allPapers.forEach(p => {
                journalCounts[p.source] = (journalCounts[p.source] || 0) + 1;
                let tags = p.tags || [];
                tags.forEach(t => {
                    if (topicCounts[t] !== undefined) topicCounts[t]++;
                });
                
                // Calculate unread items for current folder to decide if mark all read button is needed
                if (!readPapers.includes(p.filename)) {
                    if (currentFolder === 'archive') unreadInCurrentFolder++;
                    if (currentFolder.startsWith('topic:') && tags.includes(currentFolder.replace('topic:', ''))) unreadInCurrentFolder++;
                    if (currentFolder.startsWith('journal:') && p.source === currentFolder.replace('journal:', '')) unreadInCurrentFolder++;
                }
            });
            
            document.getElementById('count-starred').textContent = starredCount;
            document.getElementById('count-archive').textContent = archiveCount;
            document.getElementById('count-stability').textContent = topicCounts['stability'];
            
            // Populate Journals if empty
            let journalList = document.getElementById('journal-folders');
            if (journalList.children.length === 0) {
                let sortedJournals = Object.keys(journalCounts).sort();
                sortedJournals.forEach(j => {
                    let li = document.createElement('li');
                    let a = document.createElement('a');
                    a.href = '#';
                    a.className = 'folder-link';
                    a.onclick = function(e) { e.preventDefault(); switchFolder('journal:' + j, this); };
                    
                    let spanName = document.createElement('span');
                    spanName.textContent = j;
                    let spanCount = document.createElement('span');
                    spanCount.className = 'sidebar-count';
                    spanCount.textContent = journalCounts[j];
                    
                    a.appendChild(spanName);
                    a.appendChild(spanCount);
                    li.appendChild(a);
                    journalList.appendChild(li);
                });
            }
            
            // Show/hide mark all read button
            document.getElementById('mark-all-read').style.display = (currentFolder === 'inbox' && inboxCount > 0) ? 'inline-block' : 'none';

            // 2. Filter papers for the current view
            let papersToRender = allPapers.filter(p => {
                if (currentFolder === 'inbox') return !readPapers.includes(p.filename);
                if (currentFolder === 'starred') return starredPapers.includes(p.filename);
                if (currentFolder === 'archive') return true;
                if (currentFolder.startsWith('topic:')) {
                    return (p.tags || []).includes(currentFolder.replace('topic:', ''));
                }
                if (currentFolder.startsWith('journal:')) {
                    return p.source === currentFolder.replace('journal:', '');
                }
                return true;
            });

            let container = document.getElementById('fluids-list-container');
            container.innerHTML = '';
            
            if (papersToRender.length === 0) {
                container.innerHTML = '<p style="color:var(--text-secondary);padding:20px 0;">当前文件夹为空。</p>';
                return;
            }
            
            // 3. Render list grouped by month
            let groups = {};
            let groupOrder = [];
            papersToRender.forEach(p => {
                let month = formatMonth(p.date);
                if (!groups[month]) {
                    groups[month] = [];
                    groupOrder.push(month);
                }
                groups[month].push(p);
            });
            
            groupOrder.forEach(month => {
                let groupDiv = document.createElement('div');
                groupDiv.className = 'paper-group';
                
                let header = document.createElement('h2');
                header.className = 'paper-group-header';
                header.textContent = month;
                groupDiv.appendChild(header);
                
                let ul = document.createElement('ul');
                ul.className = 'paper-list';
                
                groups[month].forEach(p => {
                    let li = document.createElement('li');
                    
                    let isRead = readPapers.includes(p.filename);
                    let isStarred = starredPapers.includes(p.filename);
                    
                    let link = document.createElement('a');
                    link.href = 'post.html?file=fluids/' + p.filename;
                    link.className = 'paper-link' + (isRead ? ' read' : '');
                    link.onclick = function() { markRead(p.filename); };
                    
                    let titleRow = document.createElement('div');
                    titleRow.className = 'paper-title-row';
                    
                    let title = document.createElement('span');
                    title.className = 'paper-title';
                    title.textContent = p.title;
                    
                    let starBtn = document.createElement('button');
                    starBtn.className = 'paper-star' + (isStarred ? ' active' : '');
                    starBtn.innerHTML = '★';
                    starBtn.onclick = function(e) { toggleStar(e, p.filename); };
                    
                    titleRow.appendChild(starBtn);
                    titleRow.appendChild(title);
                    
                    let meta = document.createElement('div');
                    meta.className = 'paper-meta';
                    // Minimalist dot-separated meta
                    meta.textContent = p.source + ' · ' + p.date + ' · ' + p.authors;
                    
                    link.appendChild(titleRow);
                    link.appendChild(meta);
                    li.appendChild(link);
                    ul.appendChild(li);
                });
                
                groupDiv.appendChild(ul);
                container.appendChild(groupDiv);
            });
            
            // 4. Toggle mark-all-read button visibility
            let markBtn = document.getElementById('mark-all-read');
            if (markBtn) {
                markBtn.style.display = unreadInCurrentFolder > 0 ? 'inline-block' : 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetch('fluids.json')
                .then(response => {
                    if (!response.ok) throw new Error('网络请求失败');
                    return response.json();
                })
                .then(data => {
                    allPapers = data;
                    render();
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById('fluids-list-container').innerHTML = '<p style="color:var(--text-secondary);padding:20px 0;">加载失败。</p>';
                });
        });
    </script>
    <script src="script.js"></script>
    <script src="search.js"></script>
</body>
</html>
