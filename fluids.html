<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="流体动力学与偏微分方程最新论文">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <title>流体论文</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">✦</a>
            <div class="nav-links">
                <a href="publications.html">出版物</a>
                <a href="resume.html">简历</a>
                <a href="notes.html">笔记</a>
                <a href="fluids.html" class="active">流体论文</a>
                <button id="search-btn" class="search-btn" aria-label="搜索"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
            </div>
        </div>
    </nav>

    <div id="search-overlay" class="search-overlay">
        <div class="search-panel">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input id="search-input" class="search-input" type="text" placeholder="搜索" autocomplete="off">
                </div>
                <div id="search-label" class="search-results-label">快速链接</div>
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
    </div>

    <main class="main stagger">
        <h1 class="page-title fade-in">流体论文</h1>
        <p class="page-desc fade-in">每日自动更新的流体及偏微分方程文献阅读</p>

        <div class="fluids-layout fade-in">
            <aside class="fluids-sidebar" id="fluids-sidebar">
                <!-- Sidebar dates injected here -->
            </aside>
            <div class="fluids-content" id="fluids-content">
                <p style="color: var(--text-secondary); padding: 20px;">正在加载论文数据...</p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
                <span id="last-updated"></span>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('fluids.json')
                .then(response => {
                    if (!response.ok) throw new Error('网络请求失败');
                    return response.json();
                })
                .then(data => {
                    const contentEl = document.getElementById('fluids-content');
                    const sidebarEl = document.getElementById('fluids-sidebar');
                    contentEl.innerHTML = '';
                    sidebarEl.innerHTML = '';
                    if (data.length === 0) {
                        contentEl.innerHTML = '<p style="color: var(--text-secondary); padding: 20px;">暂无论文数据。</p>';
                        return;
                    }
                    
                    const groups = {};
                    data.forEach(item => {
                        const parts = item.date.split('-');
                        const displayDate = `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
                        const groupId = item.date;
                        if (!groups[groupId]) groups[groupId] = { display: displayDate, items: [] };
                        groups[groupId].items.push(item);
                    });
                    
                    for (const [groupId, groupData] of Object.entries(groups)) {
                        const a = document.createElement('a');
                        a.href = '#' + groupId;
                        a.textContent = groupData.display;
                        sidebarEl.appendChild(a);
                        
                        const groupDiv = document.createElement('div');
                        groupDiv.className = 'date-group';
                        groupDiv.id = groupId;
                        
                        const header = document.createElement('h2');
                        header.className = 'date-header';
                        header.textContent = groupData.display;
                        groupDiv.appendChild(header);
                        
                        const ul = document.createElement('ul');
                        ul.className = 'item-list stagger';
                        
                        groupData.items.forEach(item => {
                            const li = document.createElement('li');
                            li.className = 'fade-in';
                            li.innerHTML = `
                                <a href="post.html?file=../fluids/${item.filename}" class="item-link">
                                    <span class="item-title">${item.title}</span>
                                    <span class="item-meta">${item.date} · ${item.source} · ${item.authors}</span>
                                </a>
                            `;
                            ul.appendChild(li);
                        });
                        
                        groupDiv.appendChild(ul);
                        contentEl.appendChild(groupDiv);
                    }
                })
                .catch(error => {
                    console.error('Error loading fluids.json:', error);
                    document.getElementById('fluids-content').innerHTML = '<p style="color: red; padding: 20px;">加载失败：请确保在本地服务器环境下运行。</p>';
                });
        });
    </script>
    <script src="script.js"></script>
    <script src="search.js"></script>
</body>
</html>
