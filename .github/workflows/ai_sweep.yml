name: Global AI Purge Sweep

on:
  workflow_dispatch: # 只允许手动触发

jobs:
  sweep-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser deep-translator imap-tools

    - name: Run Global AI Sweep
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_MODEL: ${{ vars.LLM_MODEL }}
      run: |
        python scripts/ai_sweep.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add fluids/ fluids.json
        # 只有在有更改时才提交 (比如删除了文件)
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-purge unrelated papers via AI sweep" && git push)
