name: Daily Fluid Papers Update

on:
  schedule:
    - cron: '40 0 * * *' # 每天北京时间 8:40 运行 (修改此时间以唤醒 GitHub 定时任务)
  workflow_dispatch: # 允许手动触发

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser deep-translator imap-tools

    - name: Run update script
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_MODEL: ${{ vars.LLM_MODEL }}
      run: |
        python scripts/update_fluids.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        # 只有在有更改时才提交
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update fluid papers" && git push)
