<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <div class="glass-card fade-in">
            <h1 id="greeting">你好！</h1>
            <p class="subtitle">欢迎来到我的<span class="gradient-text">全新网站</span></p>
            
            <div class="content">
                <p>这是一个简单但充满现代感的起点。你可以把它想象成你在浩瀚互联网中的专属小岛。</p>
                <p>从这里开始，我们可以添加博客、作品集、或者任何你喜欢的内容。</p>
            </div>

            <div class="actions">
                <button class="btn primary" onclick="alert('准备好起飞了吗？')">探索更多</button>
                <button class="btn secondary" onclick="alert('联系功能建设中...')">联系我</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
